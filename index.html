<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Execurive ML Checker</title>
<style>
body {
  font-family: Arial, sans-serif;
  background: #0f172a;
  color: #fff;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  margin: 0;
}
.container {
  background: #1e293b;
  padding: 30px;
  border-radius: 15px;
  width: 350px;
  text-align: center;
  box-shadow: 0 0 20px rgba(0,0,0,0.5);
}
input {
  width: 100%;
  padding: 10px;
  border-radius: 10px;
  border: none;
  margin-bottom: 10px;
}
button {
  width: 100%;
  padding: 10px;
  border: none;
  border-radius: 10px;
  background: #38bdf8;
  color: #000;
  font-weight: bold;
  cursor: pointer;
}
button:hover {
  background: #0ea5e9;
}
.result {
  margin-top: 15px;
}
.loading {
  color: #38bdf8;
}
.badge {
  margin-top: 10px;
  display: inline-block;
  padding: 5px 10px;
  background: #22c55e;
  border-radius: 10px;
  font-size: 12px;
}
</style>
</head>
<body>

<div class="container">
  <h2>ML ID Checker</h2>
  <input type="text" id="userid" placeholder="12345678(1234)">
  <button onclick="cekID()">Cek Nickname</button>

  <div class="result" id="result"></div>
</div>

<script>
async function cekID() {
  const input = document.getElementById('userid').value;
  const result = document.getElementById('result');

  if (!input.includes('(')) {
    result.innerHTML = "❌ Format salah! Contoh: 12345678(1234)";
    return;
  }

  let [id, server] = input.replace(')', '').split('(');

  result.innerHTML = '<p class="loading">Loading...</p>';

  try {
    // GANTI API INI DENGAN API YANG KAMU TEMUKAN
    let res = await fetch(`https://api.agify.io/?name=${id}`);
    let data = await res.json();

    // SIMULASI NICKNAME (karena API asli tidak tersedia publik)
    let nickname = "User_" + id.substring(0,4);

    result.innerHTML = `
      <p>✅ Nickname: <b>${nickname}</b></p>
      <p>ID: ${id}</p>
      <p>Server: ${server}</p>
      <div class="badge">Cowo ON MIC 🎤</div>
    `;

  } catch (err) {
    result.innerHTML = "❌ Gagal mengambil data";
  }
}
</script>

</body>
</html>
