<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ExeMusic Status</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0b0f0c;
    color: #eaffea;
}

/* HEADER */
.header {
    background: linear-gradient(90deg, #00ff88, #003322);
    padding: 20px;
    text-align: center;
    font-size: 24px;
    font-weight: bold;
}

/* STATUS BOX */
.status-box {
    margin: 30px auto;
    width: 90%;
    max-width: 500px;
    padding: 20px;
    border-radius: 15px;
    text-align: center;
    background: #111;
    box-shadow: 0 0 20px rgba(0,255,136,0.3);
}

.status-text {
    font-size: 22px;
    margin-top: 10px;
}

.online { color: #00ff88; }
.down { color: #ff4444; }
.maintenance { color: #ffaa00; }

/* BUTTON */
button {
    margin-top: 15px;
    padding: 10px 20px;
    border: none;
    border-radius: 10px;
    background: #00ff88;
    color: #000;
    font-weight: bold;
    cursor: pointer;
}

button:hover {
    background: #00cc66;
}

/* GRAPH */
.graph {
    width: 90%;
    max-width: 600px;
    margin: 30px auto;
}

.bar {
    height: 10px;
    margin: 5px 0;
    background: #00ff88;
}

/* FOOTER */
.footer {
    text-align: center;
    padding: 20px;
    opacity: 0.5;
}
</style>
</head>

<body>

<div class="header">
🎧 ExeMusic Status
</div>

<div class="status-box">
<div id="statusIcon">🟢</div>
<div class="status-text" id="statusText">Semua sistem normal</div>

<button onclick="reportIssue()">Laporkan Gangguan</button>
</div>

<div class="graph">
<h3>📊 Laporan 24 Jam</h3>
<div id="graphContainer"></div>
</div>

<div class="footer">
ExeMusic © 2026 — System Monitor
</div>

<script>
// STATUS SYSTEM (ubah manual atau pakai API nanti)
let status = "online"; // online, down, maintenance

function updateStatus() {
    const text = document.getElementById("statusText");
    const icon = document.getElementById("statusIcon");

    if (status === "online") {
        text.innerText = "Semua sistem normal";
        text.className = "status-text online";
        icon.innerText = "🟢";
    }
    else if (status === "down") {
        text.innerText = "Server sedang down!";
        text.className = "status-text down";
        icon.innerText = "🔴";
    }
    else if (status === "maintenance") {
        text.innerText = "Sedang maintenance";
        text.className = "status-text maintenance";
        icon.innerText = "🟡";
    }
}

// FAKE GRAPH DATA
function generateGraph() {
    const container = document.getElementById("graphContainer");
    container.innerHTML = "";

    for (let i = 0; i < 24; i++) {
        let value = Math.floor(Math.random() * 100);
        let bar = document.createElement("div");
        bar.className = "bar";
        bar.style.width = value + "%";
        container.appendChild(bar);
    }
}

// REPORT BUTTON
function reportIssue() {
    alert("Terima kasih! Laporan kamu sudah dikirim 🚀");
}

// AUTO RANDOM STATUS (biar keliatan hidup)
setInterval(() => {
    let states = ["online", "down", "maintenance"];
    status = states[Math.floor(Math.random() * states.length)];
    updateStatus();
}, 10000);

// INIT
updateStatus();
generateGraph();
</script>

</body>
</html>
