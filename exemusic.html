<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Just a moment… — exemusic.github.io</title>
  <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Geist+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0a;
      --surface: #111111;
      --surface2: #1a1a1a;
      --border: rgba(255,255,255,0.08);
      --border-hover: rgba(255,255,255,0.15);
      --text: #f0f0f0;
      --text-muted: #666;
      --text-dim: #444;
      --accent: #f0f0f0;
      --green: #3fb950;
      --green-dim: rgba(63,185,80,0.12);
      --green-border: rgba(63,185,80,0.3);
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
      -webkit-font-smoothing: antialiased;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 1.5rem;
    }

    /* noise overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
      opacity: 0.4;
    }

    .wrap {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 400px;
      animation: fadeUp 0.5s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* top domain bar */
    .domain-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 2rem;
      padding: 8px 12px;
      background: var(--surface);
      border: 0.5px solid var(--border);
      border-radius: 8px;
      width: fit-content;
    }
    .domain-bar .lock {
      color: var(--green);
      display: flex;
      align-items: center;
    }
    .domain-bar .url {
      font-family: 'Geist Mono', monospace;
      font-size: 12px;
      color: var(--text-muted);
      letter-spacing: 0.01em;
    }
    .domain-bar .url span {
      color: var(--text);
    }

    /* card */
    .card {
      background: var(--surface);
      border: 0.5px solid var(--border);
      border-radius: 16px;
      padding: 2rem;
      width: 100%;
    }

    .card-top {
      display: flex;
      align-items: flex-start;
      gap: 14px;
      margin-bottom: 1.75rem;
    }

    .icon-wrap {
      width: 42px;
      height: 42px;
      background: var(--surface2);
      border: 0.5px solid var(--border);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .card-title {
      font-size: 17px;
      font-weight: 500;
      color: var(--text);
      margin-bottom: 5px;
      letter-spacing: -0.01em;
    }
    .card-sub {
      font-size: 13px;
      color: var(--text-muted);
      line-height: 1.55;
    }

    .divider {
      height: 0.5px;
      background: var(--border);
      margin-bottom: 1.5rem;
    }

    /* turnstile container */
    .ts-label {
      font-size: 11px;
      font-weight: 500;
      color: var(--text-dim);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    #ts-container {
      width: 100%;
      min-height: 65px;
      display: flex;
      align-items: center;
    }

    /* override turnstile iframe styling */
    #ts-container iframe {
      border-radius: 8px !important;
    }

    /* progress */
    .progress-wrap {
      margin-top: 1.25rem;
    }
    .progress-track {
      height: 2px;
      background: var(--surface2);
      border-radius: 99px;
      overflow: hidden;
      margin-bottom: 8px;
    }
    .progress-fill {
      height: 100%;
      background: var(--green);
      border-radius: 99px;
      width: 0%;
      transition: width 0.6s cubic-bezier(0.4,0,0.2,1);
    }
    .progress-status {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 12px;
      color: var(--text-muted);
      font-family: 'Geist Mono', monospace;
    }
    .status-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--text-dim);
      flex-shrink: 0;
      transition: background 0.3s;
    }
    .status-dot.active {
      background: var(--green);
      box-shadow: 0 0 6px rgba(63,185,80,0.5);
    }

    /* success */
    .success-msg {
      display: none;
      align-items: center;
      gap: 8px;
      margin-top: 1rem;
      padding: 10px 14px;
      background: var(--green-dim);
      border: 0.5px solid var(--green-border);
      border-radius: 8px;
      font-size: 13px;
      color: var(--green);
      font-weight: 400;
      animation: fadeIn 0.3s ease;
    }
    .success-msg.show { display: flex; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    /* footer */
    .card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 1.5rem;
      padding-top: 1.25rem;
      border-top: 0.5px solid var(--border);
    }
    .ray {
      font-family: 'Geist Mono', monospace;
      font-size: 10px;
      color: var(--text-dim);
    }
    .cf-badge {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 10px;
      color: var(--text-dim);
    }

    /* redirect overlay */
    .redirect-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: var(--bg);
      z-index: 100;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 12px;
      animation: fadeIn 0.3s ease;
    }
    .redirect-overlay.show { display: flex; }
    .redirect-spinner {
      width: 20px;
      height: 20px;
      border: 1.5px solid var(--border);
      border-top-color: var(--green);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .redirect-text {
      font-family: 'Geist Mono', monospace;
      font-size: 12px;
      color: var(--text-muted);
    }
  </style>
</head>
<body>

<div class="wrap">

  <div class="domain-bar">
    <span class="lock">
      <svg width="11" height="11" viewBox="0 0 16 16" fill="currentColor">
        <path d="M4 7V5a4 4 0 118 0v2h.5A1.5 1.5 0 0114 8.5v5A1.5 1.5 0 0112.5 15h-9A1.5 1.5 0 012 13.5v-5A1.5 1.5 0 013.5 7H4zm1 0h6V5a3 3 0 10-6 0v2z"/>
      </svg>
    </span>
    <span class="url"><span>exemusic</span>.github.io</span>
  </div>

  <div class="card">

    <div class="card-top">
      <div class="icon-wrap">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
          <path d="M12 2L3 6.5V12c0 5 3.6 9.7 9 11 5.4-1.3 9-6 9-11V6.5L12 2z" stroke="#3fb950" stroke-width="1.5" stroke-linejoin="round"/>
          <path d="M9 12l2 2 4-4" stroke="#3fb950" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <div>
        <div class="card-title">Checking your connection</div>
        <div class="card-sub">exemusic.github.io needs to verify your browser before you can continue.</div>
      </div>
    </div>

    <div class="divider"></div>

    <div class="ts-label">Security verification</div>
    <div id="ts-container">
      <div
        class="cf-turnstile"
        data-sitekey="0x4AAAAAACvnkQO28G3-oFga"
        data-theme="dark"
        data-callback="onVerified"
        data-appearance="always"
        style="width:100%"
      ></div>
    </div>

    <div class="progress-wrap">
      <div class="progress-track">
        <div class="progress-fill" id="pbar"></div>
      </div>
      <div class="progress-status">
        <div class="status-dot" id="sdot"></div>
        <span id="smsg">Waiting for verification...</span>
      </div>
    </div>

    <div class="success-msg" id="success-msg">
      <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor">
        <path d="M13.78 4.22a.75.75 0 010 1.06l-7.25 7.25a.75.75 0 01-1.06 0L2.22 9.28a.75.75 0 011.06-1.06L6 10.94l6.72-6.72a.75.75 0 011.06 0z"/>
      </svg>
      Verification successful — redirecting...
    </div>

    <div class="card-footer">
      <span class="ray" id="rayid">Ray ID: —</span>
      <div class="cf-badge">
        <svg width="12" height="12" viewBox="0 0 81 81" fill="none">
          <path d="M59.4 48.6c.7-2.6.4-4.9-.8-6.6-1.1-1.6-2.9-2.5-5.2-2.6l-30.1-.4c-.2 0-.4-.1-.5-.3-.1-.2-.1-.4 0-.6.2-.4.6-.7 1.1-.7l30.4-.4c3.6-.2 7.5-3.1 8.9-6.6l1.7-4.5c.1-.2.1-.4 0-.6C62.2 17.3 54.4 12 45.4 12c-8.4 0-15.6 4.6-19.4 11.4-1.8-1.3-4-2-6.4-1.8-4.5.4-8.1 4-8.5 8.5-.1 1 0 2 .2 2.9C5.9 33.8 2 38.4 2 43.9c0 .4 0 .8.1 1.2.1.4.4.6.8.6l55.8.1c.4 0 .8-.3.9-.7l-.2-.5z" fill="#F6821F"/>
          <path d="M68.1 33c-.5 0-1 0-1.5.1-.3 0-.6.3-.7.5l-2.1 7.2c-.7 2.6-.4 4.9.8 6.6 1.1 1.6 2.9 2.5 5.2 2.6l6.4.4c.2 0 .4.1.5.3.1.2.1.4 0 .6-.2.4-.6.7-1.1.7l-6.7.4c-3.7.2-7.5 3.1-8.9 6.6l-.5 1.2c-.1.3.1.6.4.6h22.5c.4 0 .7-.2.8-.6.4-1.5.7-3.1.7-4.8 0-12.3-10-22.4-16.8-22.4v.5z" fill="#FBAD41"/>
        </svg>
        Protected by Cloudflare
      </div>
    </div>

  </div>
</div>

<div class="redirect-overlay" id="overlay">
  <div class="redirect-spinner"></div>
  <div class="redirect-text">Redirecting to exemusic.github.io...</div>
</div>

<script>
  // Ray ID
  const ray = Array.from({length:16}, () => Math.floor(Math.random()*16).toString(16)).join('');
  document.getElementById('rayid').textContent = 'Ray ID: ' + ray;

  // Animate progress bar while waiting
  const pbar = document.getElementById('pbar');
  const sdot = document.getElementById('sdot');
  const smsg = document.getElementById('smsg');

  const waitSteps = [
    [15, 'Initializing challenge...'],
    [35, 'Loading Turnstile widget...'],
    [55, 'Awaiting user interaction...'],
  ];
  let wi = 0;
  function animateWait() {
    if (wi < waitSteps.length) {
      pbar.style.width = waitSteps[wi][0] + '%';
      smsg.textContent = waitSteps[wi][1];
      sdot.classList.add('active');
      wi++;
      setTimeout(animateWait, 900);
    }
  }
  setTimeout(animateWait, 400);

  // Called by Turnstile on success
  function onVerified(token) {
    pbar.style.width = '100%';
    smsg.textContent = 'Verification complete.';
    document.getElementById('success-msg').classList.add('show');

    setTimeout(() => {
      document.getElementById('overlay').classList.add('show');
      setTimeout(() => {
        window.location.href = 'index.html';
      }, 800);
    }, 1200);
  }
</script>

</body>
</html>
