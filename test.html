<!DOCTYPE html>
<html>
<head>
  <title>Roblox User Checker</title>
</head>
<body>

<h2>Roblox User Checker</h2>

<input type="number" id="userId" placeholder="Masukkan User ID">
<button onclick="checkUser()">Check</button>

<div id="result"></div>

<script>
async function checkUser() {
  const id = document.getElementById("userId").value;

  const userRes = await fetch(`https://users.roblox.com/v1/users/${id}`);
  const userData = await userRes.json();

  const avatarRes = await fetch(`https://thumbnails.roblox.com/v1/users/avatar-headshot?userIds=${id}&size=150x150&format=Png&isCircular=false`);
  const avatarData = await avatarRes.json();

  const avatarUrl = avatarData.data[0].imageUrl;

  document.getElementById("result").innerHTML = `
    <h3>${userData.name}</h3>
    <p>Display Name: ${userData.displayName}</p>
    <img src="${avatarUrl}">
  `;
}
</script>

</body>
</html>
