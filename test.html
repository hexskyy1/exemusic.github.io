<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YT to MP3/MP4 by Hengki</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }
    .container {
      text-align: center;
      background: #1e293b;
      padding: 30px;
      border-radius: 15px;
      box-shadow: 0 0 20px rgba(0,0,0,0.5);
      width: 360px;
    }
    h1 {
      font-size: 20px;
      margin-bottom: 20px;
    }
    input {
      width: 100%;
      padding: 10px;
      border-radius: 8px;
      border: none;
      margin-bottom: 15px;
    }
    button {
      padding: 10px 15px;
      border: none;
      border-radius: 8px;
      margin: 5px;
      cursor: pointer;
      font-weight: bold;
    }
    .mp3 { background: #22c55e; }
    .mp4 { background: #3b82f6; }
    #status {
      margin-top: 15px;
      font-size: 14px;
      color: #94a3b8;
    }
    a.download {
      display: block;
      margin-top: 15px;
      color: #38bdf8;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>YT to MP3/MP4<br>by Hengki</h1>
    <input type="text" id="url" placeholder="Masukkan link YouTube...">
    <br>
    <button class="mp3" onclick="convert('mp3')">Convert to MP3</button>
    <button class="mp4" onclick="convert('mp4')">Convert to MP4</button>
    <div id="status"></div>
    <div id="result"></div>
  </div>

  <script>
    async function convert(type) {
      const url = document.getElementById('url').value;
      const status = document.getElementById('status');
      const result = document.getElementById('result');

      if (!url) {
        status.innerHTML = "Masukkan link dulu!";
        return;
      }

      status.innerHTML = "Processing... tunggu bentar ⏳";
      result.innerHTML = "";

      try {
        // GANTI URL INI DENGAN BACKEND KAMU
        const response = await fetch(`https://your-backend-url.com/convert?url=${encodeURIComponent(url)}&format=${type}`);
        const data = await response.json();

        if (data.success) {
          status.innerHTML = "Selesai ✅";
          result.innerHTML = `<a class="download" href="${data.download}" target="_blank">Download ${type.toUpperCase()}</a>`;
        } else {
          status.innerHTML = "Gagal convert ❌";
        }
      } catch (err) {
        status.innerHTML = "Server error ❌";
      }
    }
  </script>
</body>
</html>
