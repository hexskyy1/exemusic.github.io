<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hexky AI - YT to MP3</title>
    <style>
        /* Gaya Visual Dark Mode & Neon (Khas Execurive Roleplay) */
        body {
            background-color: #0b0e14;
            color: #00ffcc;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background: #161b22;
            padding: 30px;
            border-radius: 15px;
            border: 2px solid #00ffcc;
            text-align: center;
            width: 350px;
            box-shadow: 0 0 20px rgba(0, 255, 204, 0.2);
        }
        h2 { margin-top: 0; color: #fff; text-transform: uppercase; letter-spacing: 2px; }
        input {
            width: 100%;
            padding: 12px;
            margin: 20px 0;
            background: #0d1117;
            border: 1px solid #00ffcc;
            border-radius: 8px;
            color: #fff;
            box-sizing: border-box;
            outline: none;
        }
        .btn-download {
            background: #00ffcc;
            color: #0b0e14;
            border: none;
            padding: 15px;
            width: 100%;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            text-decoration: none;
            display: block;
            transition: 0.3s;
        }
        .btn-download:hover {
            background: #00cca3;
            box-shadow: 0 0 15px #00ffcc;
        }
        .footer { font-size: 10px; color: #58a6ff; margin-top: 15px; }
    </style>
</head>
<body>

<div class="container">
    <h2>YT TO MP3</h2>
    <p style="font-size: 12px; color: #888;">Admin Execurive Roleplay Tool</p>
    
    <input type="text" id="urlInput" placeholder="Tempel link YouTube di sini...">
    
    <!-- Tombol ini akan otomatis berubah jadi link download -->
    <button onclick="prosesDownload()" class="btn-download">MULAI KONVERSI</button>

    <div class="footer">Dibuat oleh Hexky AI</div>
</div>

<script>
    function prosesDownload() {
        const input = document.getElementById('urlInput').value;
        
        if (!input) {
            alert("Hexky, linknya jangan lupa diisi ya!");
            return;
        }

        // Kita bersihkan linknya biar cuma ambil ID videonya
        let videoId = "";
        if (input.includes("v=")) {
            videoId = input.split("v=")[1].split("&")[0];
        } else if (input.includes("youtu.be/")) {
            videoId = input.split("youtu.be/")[1].split("?")[0];
        } else {
            videoId = input;
        }

        // Menggunakan API dari Loader.to (Sering dipakai dan lebih stabil)
        // Kita langsung arahkan user ke halaman download mereka agar tidak diblokir GitHub
        const finalUrl = `https://loader.to/api/button/?url=https://www.youtube.com/watch?v=${videoId}&f=mp3`;
        
        // Buka di tab baru
        window.open(finalUrl, '_blank');
    }
</script>

</body>
</html>
