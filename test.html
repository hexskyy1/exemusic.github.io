<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>ExeMusic Embed Player</title>

  <style>
    body {
      margin: 0;
      background: #0b0f0c;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: Arial, sans-serif;
    }

    .player-container {
      width: 320px;
      height: 110px;
      border-radius: 14px;
      overflow: hidden;
      box-shadow: 0 0 20px rgba(0,255,120,0.2);
      background: #000;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }
  </style>
</head>
<body>

  <div class="player-container">
    <iframe 
      src="https://exemusic.github.io/?id=145&embed=true&autoplay=true"
      allow="autoplay">
    </iframe>
  </div>

</body>
</html>
