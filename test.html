<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>YT to MP3/MP4 by Hengki</title>
  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      text-align: center;
      padding-top: 100px;
    }
    input {
      padding: 10px;
      width: 300px;
      border-radius: 8px;
      border: none;
    }
    button {
      padding: 10px;
      margin: 10px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
    }
    .mp3 { background: #22c55e; }
    .mp4 { background: #3b82f6; }
    #result {
      margin-top: 20px;
    }
  </style>
</head>
<body>

  <h2>YT to MP3/MP4<br>by Hengki</h2>

  <input type="text" id="url" placeholder="Masukkan link YouTube...">
  <br>

  <button class="mp3" onclick="convert('mp3')">MP3</button>
  <button class="mp4" onclick="convert('mp4')">MP4</button>

  <div id="result"></div>

<script>
async function convert(type) {
  const url = document.getElementById("url").value;
  const result = document.getElementById("result");

  if (!url) {
    result.innerHTML = "Masukkan link dulu!";
    return;
  }

  result.innerHTML = "Processing... ⏳";

  try {
    const response = await fetch("https://youtube-mp36.p.rapidapi.com/dl", {
      method: "POST",
      headers: {
        "x-rapidapi-key": "7b17bf3ab4mshb72cf086f868e75p1087cejsnb980948f364d",
        "x-rapidapi-host": "youtube-mp36.p.rapidapi.com",
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ url: url })
    });

    const data = await response.json();

    if (data.link) {
      result.innerHTML = `<a href="${data.link}" target="_blank">Download ${type.toUpperCase()}</a>`;
    } else {
      result.innerHTML = "Gagal convert ❌";
    }

  } catch (err) {
    result.innerHTML = "Server error ❌";
  }
}
</script>

</body>
</html>
