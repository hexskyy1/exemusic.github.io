<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MiraAudio</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:system-ui,-apple-system,Segoe UI,Roboto;
}

body{
height:100vh;
display:flex;
align-items:center;
justify-content:center;
background:radial-gradient(circle at center,#0f172a,#020617);
color:white;
overflow:hidden;
}

.container{
text-align:center;
animation:fade 1.5s ease;
padding:20px;
}

.logo{
font-size:48px;
font-weight:700;
letter-spacing:2px;
background:linear-gradient(90deg,#22c1ff,#6f8cff);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
animation:slide 1.2s ease;
}

.version{
opacity:.6;
margin-top:8px;
font-size:14px;
}

.wait{
margin-top:25px;
font-size:15px;
opacity:.8;
}

button{
margin-top:25px;
padding:12px 35px;
font-size:16px;
border:none;
border-radius:10px;
background:#334155;
color:#aaa;
cursor:not-allowed;
transition:.3s;
}

button.active{
background:linear-gradient(90deg,#3b82f6,#22c1ff);
color:white;
cursor:pointer;
transform:scale(1.05);
}

button.active:hover{
transform:scale(1.08);
}

@keyframes fade{
from{opacity:0}
to{opacity:1}
}

@keyframes slide{
from{
transform:translateY(-30px);
opacity:0
}
to{
transform:translateY(0);
opacity:1
}
}

@media(max-width:600px){
.logo{
font-size:34px;
}
}

</style>
</head>

<body>

<div class="container">

<div class="logo">Welcome to MiraAudio</div>
<div class="version">v1.0</div>

<div class="wait">
Please wait <span id="count">5</span> seconds
</div>

<button id="continueBtn" disabled>Continue</button>

</div>

<audio id="welcomeAudio" preload="auto">
<source src="https://audio.jukehost.co.uk/22z0kp56nmEaZgdWYOvvmbBy0NJjMGBd.mp3" type="audio/mpeg">
</audio>

<script>

const audio = document.getElementById("welcomeAudio");
audio.volume = 0.15;

let started = false;

function startAudio(){
if(!started){
audio.play().catch(()=>{});
started = true;
}
}

document.body.addEventListener("click", startAudio);

let time = 5;
const count = document.getElementById("count");
const btn = document.getElementById("continueBtn");

const timer = setInterval(()=>{

time--;
count.textContent = time;

if(time <= 0){

clearInterval(timer);

count.textContent = "0";

btn.disabled = false;
btn.classList.add("active");

}

},1000);

btn.onclick = ()=>{
window.location.href="index.html";
};

</script>

</body>
</html>
