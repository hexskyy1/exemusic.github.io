<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ExeMusic YT Audio</title>

<style>
body{
background:#0f0f0f;
font-family:Arial;
color:white;
display:flex;
align-items:center;
justify-content:center;
height:100vh;
margin:0;
}

.box{
background:#1c1c1c;
padding:30px;
border-radius:14px;
width:420px;
text-align:center;
}

input{
width:100%;
padding:12px;
border:none;
border-radius:8px;
background:#2a2a2a;
color:white;
margin-bottom:10px;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:8px;
background:#ff0033;
color:white;
font-weight:bold;
cursor:pointer;
}

audio{
margin-top:20px;
width:100%;
}
</style>
</head>

<body>

<div class="box">

<h2>ExeMusic YT Audio</h2>

<input id="url" placeholder="Paste YouTube Link">

<button onclick="play()">Play</button>

<audio id="player" controls></audio>

</div>

<script>

function getID(url){
let regExp = /(?:youtube\.com.*(?:\?|&)v=|youtu\.be\/)([^&#]+)/;
let match = url.match(regExp);
return match ? match[1] : null;
}

async function play(){

let url = document.getElementById("url").value
let id = getID(url)

if(!id){
alert("Link tidak valid")
return
}

let api = "https://piped.video/api/v1/streams/" + id

let res = await fetch(api)
let data = await res.json()

let audio = data.audioStreams[0].url

let player = document.getElementById("player")
player.src = audio
player.play()

}

</script>

</body>
</html>
