<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>test</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

</head>
<body>

<h2>Upload Lagu</h2>

<input type="file" id="fileInput" accept="audio/*">
<br><br>

<button id="uploadBtn">Upload</button>

<p id="result"></p>

<script>

// ganti dengan API kamu
const supabaseUrl = "https://hikzgjseckxanetyxqkc.supabase.co";
const supabaseKey = "sb_publishable_lRARo_osK1IOcIDegeW-jA_9k39aCto";

const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

document.getElementById("uploadBtn").addEventListener("click", uploadFile);

async function uploadFile(){

const fileInput = document.getElementById("fileInput");
const file = fileInput.files[0];

if(!file){
alert("Pilih file dulu");
return;
}

const fileName = Date.now() + "_" + file.name;

const { data, error } = await supabase.storage
.from("music")
.upload(fileName, file);

if(error){
document.getElementById("result").innerText = "Upload gagal";
console.log(error);
return;
}

const url = supabaseUrl + "/storage/v1/object/public/music/" + fileName;

document.getElementById("result").innerHTML =
"Upload sukses!<br><a href='"+url+"' target='_blank'>"+url+"</a>";

}

</script>

</body>
</html>
